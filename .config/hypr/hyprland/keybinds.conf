###################
### KEYBINDINGS ###
###################

# NO USE
# bind = Y
# bind = A
# bind = W

# See https://wiki.hypr.land/Configuring/Keywords/

$mainMod = ALT # Sets "Windows" key as main modifier

bind = $mainMod, SPACE, exec, $menu
# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
#bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, kitty -e yazi
bind = SUPER, V, togglefloating,
bind = $mainMod, D, exec, $dmenu
# bind = $mainMod, P, pseudo, # dwindle
#bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = SUPER, F, fullscreen
bind = SUPER SHIFT, L, exec, hyprlock

bind = $mainMod, R, exec, sh ~/fastprobe.sh


# My apps
bind = $mainMod, B, exec, $browser
#bind = $mainMod, O, exec, obsidian

# Move focus with mainMod + arrow keys
#bind = ALT, left, movefocus, l
#bind = ALT, right, movefocus, r
#bind = ALT, up, movefocus, u
#bind = ALT, down, movefocus, d

bind = $mainMod CTRL, h, movefocus, l
bind = $mainMod CTRL, l, movefocus, r
bind = $mainMod CTRL, k, movefocus, u
bind = $mainMod CTRL, j, movefocus, d

# Use Wtype for remap keybinds
bind = SUPER, H, exec, wtype -k Left
bind = SUPER, J, exec, wtype -k Down
bind = SUPER, K, exec, wtype -k Up
bind = SUPER, L, exec, wtype -k Right

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Special Workspaces
bind = $mainMod, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, O, togglespecialworkspace, obsidian
bind = SUPER SHIFT, O, movetoworkspace, special:obsidian

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize windows
bind = $mainMod SUPER, l, resizeactive, 210 0
bind = $mainMod SUPER, h, resizeactive, -210 0
bind = $mainMod SUPER, k, resizeactive, 0 -210
bind = $mainMod SUPER, j, resizeactive, 0 210

# Move window
bind = CTRL SUPER, H, swapwindow, l
bind = CTRL SUPER, L, swapwindow, r
bind = CTRL SUPER, K, swapwindow, u
bind = CTRL SUPER, J, swapwindow, d

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bind = SUPER CTRL, Space, exec, playerctl play-pause

# Groups
bind = $mainMod, G, togglegroup # Agrupar / Desagrupar la ventana actual
bind = ALT, tab, changegroupactive, f    # 'f' de forward (adelante)
bind = ALT SHIFT, tab, changegroupactive, b  # 'b' de backward (atrás)
bind = $mainMod SHIFT, G, moveoutofgroup

# Notification
bind = ALT, P, exec, swaync-client -t

# Cipboard
bind = ALT, V, exec, cliphist list | rofi -dmenu -display-columns 2 -p "Clipboard" -theme /home/hervert/.config/rofi/launcher.rasi | cliphist decode | wl-copy

# Scrennshot
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f - #swappy
#bind = $mainMod SHIFT, S, exec, hyprshot -m region --clipboard-only
