decoration {
  rounding = 20
  rounding_power = 10

  # Change transparency of focused and unfocused windows
  active_opacity = 1.0
  inactive_opacity = 1.0

  shadow {
    enabled = true
    range = 20
    render_power = 3
    color = rgba(000000dd)
  }

  # https://wiki.hypr.land/Configuring/Variables/#blur
  blur {
    enabled = true
    size = 10
    passes = 3
    ignore_opacity = true

    noise = 0.08
    contrast = 1.5

    xray = false
    new_optimizations = true

    vibrancy = 0.1696
  }
}
